<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" />
    </marker>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8fafc" rx="8" />

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">VOTER Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#64748b">Voting-based Orchestration for Temporal Enforcement at Runtime</text>

  <!-- ==================== CPEE Process Engine ==================== -->
  <rect x="30" y="85" width="220" height="190" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
  <text x="140" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">CPEE Process Engine</text>
  <!-- Inner elements -->
  <rect x="50" y="125" width="180" height="34" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="140" y="147" text-anchor="middle" font-size="11" fill="#1e40af">Process Instance</text>
  <rect x="50" y="168" width="180" height="34" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="140" y="190" text-anchor="middle" font-size="11" fill="#1e40af">Subscriptions</text>
  <rect x="50" y="211" width="180" height="34" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="140" y="233" text-anchor="middle" font-size="11" fill="#1e40af">Requirements (Attributes)</text>

  <!-- ==================== VOTER System (main box) ==================== -->
  <rect x="310" y="85" width="340" height="440" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)" />
  <text x="480" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#15803d">VOTER</text>

  <!-- Transformer -->
  <rect x="330" y="125" width="300" height="80" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" />
  <text x="480" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Transformer</text>
  <text x="480" y="165" text-anchor="middle" font-size="10" fill="#4b5563">/transform</text>
  <text x="480" y="180" text-anchor="middle" font-size="9" fill="#6b7280">Parse requirements · Modify process tree</text>
  <text x="480" y="193" text-anchor="middle" font-size="9" fill="#6b7280">Remove explicit temporal patterns</text>

  <!-- Vote Syncing Before -->
  <rect x="330" y="220" width="300" height="65" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" />
  <text x="480" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Vote Syncing Before</text>
  <text x="480" y="258" text-anchor="middle" font-size="10" fill="#4b5563">/vote_syncing_before</text>
  <text x="480" y="273" text-anchor="middle" font-size="9" fill="#6b7280">Open subprocess instances · Check events</text>

  <!-- Vote Syncing After -->
  <rect x="330" y="300" width="300" height="65" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" />
  <text x="480" y="323" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Vote Syncing After</text>
  <text x="480" y="338" text-anchor="middle" font-size="10" fill="#4b5563">/vote_syncing_after</text>
  <text x="480" y="353" text-anchor="middle" font-size="9" fill="#6b7280">Abandon subprocess instances</text>

  <!-- Jobs Dispatcher -->
  <rect x="330" y="380" width="140" height="55" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" />
  <text x="400" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Jobs</text>
  <text x="400" y="418" text-anchor="middle" font-size="9" fill="#6b7280">Dispatch · Handle</text>
  <text x="400" y="430" text-anchor="middle" font-size="9" fill="#6b7280">open · abandon · check</text>

  <!-- Hashmap -->
  <rect x="490" y="380" width="140" height="55" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" />
  <text x="560" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Hashmap</text>
  <text x="560" y="418" text-anchor="middle" font-size="9" fill="#6b7280">CallerID + InstanceID</text>
  <text x="560" y="430" text-anchor="middle" font-size="9" fill="#6b7280">→ Job List</text>

  <!-- Modifier Patterns -->
  <rect x="330" y="450" width="300" height="55" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" />
  <text x="480" y="472" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Modifier Patterns</text>
  <text x="480" y="488" text-anchor="middle" font-size="9" fill="#6b7280">maxExecTime · recurring · waitForEvent · waitForTimeout</text>

  <!-- ==================== Subprocess Instances ==================== -->
  <rect x="700" y="85" width="180" height="240" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)" />
  <text x="790" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Subprocess Instances</text>
  <text x="790" y="126" text-anchor="middle" font-size="10" fill="#a16207">(CPEE)</text>

  <rect x="718" y="140" width="144" height="34" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" />
  <text x="790" y="162" text-anchor="middle" font-size="10" fill="#92400e">MaxExecTime</text>

  <rect x="718" y="184" width="144" height="34" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" />
  <text x="790" y="206" text-anchor="middle" font-size="10" fill="#92400e">Recurring</text>

  <rect x="718" y="228" width="144" height="34" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" />
  <text x="790" y="250" text-anchor="middle" font-size="10" fill="#92400e">WaitForEvent</text>

  <rect x="718" y="272" width="144" height="34" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" />
  <text x="790" y="294" text-anchor="middle" font-size="10" fill="#92400e">WaitForTimeout</text>

  <!-- ==================== Compliance Log ==================== -->
  <rect x="700" y="380" width="180" height="75" rx="12" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)" />
  <text x="790" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b21a8">Compliance Log</text>
  <text x="790" y="428" text-anchor="middle" font-size="9" fill="#7c3aed">YAML Events</text>
  <text x="790" y="441" text-anchor="middle" font-size="9" fill="#7c3aed">description/change</text>

  <!-- ==================== Arrows ==================== -->

  <!-- CPEE → Transformer (description/change) -->
  <line x1="250" y1="150" x2="325" y2="150" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrowBlue)" />
  <text x="288" y="142" text-anchor="middle" font-size="8" fill="#2563eb" transform="rotate(-5, 288, 142)">description</text>
  <text x="288" y="152" text-anchor="middle" font-size="8" fill="#2563eb" transform="rotate(-5, 288, 152)">/change</text>

  <!-- CPEE → Vote Syncing Before -->
  <line x1="250" y1="210" x2="325" y2="245" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrowGreen)" />
  <text x="275" y="218" text-anchor="middle" font-size="8" fill="#16a34a">syncing</text>
  <text x="275" y="228" text-anchor="middle" font-size="8" fill="#16a34a">before</text>

  <!-- CPEE → Vote Syncing After -->
  <line x1="250" y1="250" x2="325" y2="325" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrowGreen)" />
  <text x="268" y="282" text-anchor="middle" font-size="8" fill="#16a34a">syncing</text>
  <text x="268" y="292" text-anchor="middle" font-size="8" fill="#16a34a">after</text>

  <!-- Vote Syncing Before → Subprocess Instances (open) -->
  <line x1="630" y1="252" x2="713" y2="210" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrowOrange)" />
  <text x="670" y="220" text-anchor="middle" font-size="8" fill="#d97706">open</text>

  <!-- Vote Syncing After → Subprocess Instances (abandon) -->
  <line x1="630" y1="330" x2="713" y2="280" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrowOrange)" />
  <text x="670" y="298" text-anchor="middle" font-size="8" fill="#d97706">abandon</text>

  <!-- Transformer → Compliance Log (YAML event) -->
  <line x1="630" y1="175" x2="700" y2="390" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowPurple)" />
  <text x="683" y="270" text-anchor="middle" font-size="8" fill="#7c3aed" transform="rotate(70, 683, 270)">YAML event</text>

  <!-- Internal: Transformer → Hashmap -->
  <path d="M 560 205 L 560 375" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowhead)" />
  <text x="570" y="295" font-size="8" fill="#6b7280">store jobs</text>

  <!-- Internal: Jobs ↔ Hashmap -->
  <line x1="470" y1="407" x2="485" y2="407" stroke="#6b7280" stroke-width="1.2" />

  <!-- Internal: Vote Syncing Before → Jobs -->
  <path d="M 400 285 L 400 375" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowhead)" />
  <text x="385" y="335" font-size="8" fill="#6b7280" transform="rotate(-90, 385, 335)">dispatch</text>

  <!-- ==================== Legend ==================== -->
  <rect x="30" y="530" width="840" height="75" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <text x="50" y="550" font-size="11" font-weight="bold" fill="#475569">Legend</text>

  <line x1="50" y1="570" x2="90" y2="570" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)" />
  <text x="95" y="574" font-size="9" fill="#475569">Notification</text>

  <line x1="185" y1="570" x2="225" y2="570" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text x="230" y="574" font-size="9" fill="#475569">Voting Callback</text>

  <line x1="340" y1="570" x2="380" y2="570" stroke="#d97706" stroke-width="2" marker-end="url(#arrowOrange)" />
  <text x="385" y="574" font-size="9" fill="#475569">Subprocess Mgmt</text>

  <line x1="500" y1="570" x2="540" y2="570" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)" />
  <text x="545" y="574" font-size="9" fill="#475569">Logging</text>

  <line x1="620" y1="570" x2="660" y2="570" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowhead)" />
  <text x="665" y="574" font-size="9" fill="#475569">Internal</text>
</svg>
